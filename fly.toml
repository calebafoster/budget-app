# Replace "your-app-name" with whatever name you choose on Fly
app = "budget-app-0199"
primary_region = "sjc"

[build]

[env]
  DB_PATH = "/data/budget.db"

[[mounts]]
  source = "budget_data"
  destination = "/data"

[[http_service]]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
